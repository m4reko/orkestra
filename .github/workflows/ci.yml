name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15.4"

      - name: Format code
        run: gleam format src test

      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: auto-format Gleam code"
          git push

  check:
    needs: format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15.4"

      - name: Type check
        run: gleam check

      - name: Run tests
        run: gleam test
